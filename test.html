  <h2>航天员距离上一次任务时间</h2>
  <div style="text-align: center; margin-top: 20px; margin-bottom:20px">
    <a href="astronauts.html" class="btn btn-primary">航天员</a>
  </div>
  <div id="bar-chart" style="width: 100%; height: 600px;"></div>

  <script src="./css_astronauts.js"></script>
  <script src="./cms_missions.js"></script>
  <script>
    // Exclude retired group 1 astronauts
    let activeAstronauts = astronauts.filter(a => a.group !== "1");

    // Track each astronaut's last return-to-Earth date
    let crewRecords = activeAstronauts.map(a => ({
        name: a.name,
        uid:  a.uid,
        lastEnd:   null,
        isInSpace: false
    }));

    let crewMissions = cms_missions.filter(m => m.type === "crew");

    // Process missions in chronological order
    // Both crew (launch) and return_crew (landing) update the astronaut's last mission end
    for (let i = 0; i < crewMissions.length; i++) {
        let m = crewMissions[i];
        let isOngoing = (m.end === "now");
        let endTime   = isOngoing ? null : Date.parse(m.end);

        let uidsToUpdate = [...(m.crew || []), ...(m.return_crew || [])];
        for (let k = 0; k < uidsToUpdate.length; k++) {
            for (let j = 0; j < crewRecords.length; j++) {
                if (crewRecords[j].uid === uidsToUpdate[k]) {
                    crewRecords[j].lastEnd   = endTime;
                    crewRecords[j].isInSpace = isOngoing;
                }
            }
        }
    }

    // Build chart data
    let now = Date.now();
    let chartData = crewRecords
        .filter(c => c.lastEnd !== null || c.isInSpace)
        .map(c => ({
            name:      c.name,
            timeSince: c.isInSpace ? 0 : (now - c.lastEnd) / (1000 * 60 * 60 * 24 * 365.25)
        }))
        .sort((a, b) => b.timeSince - a.timeSince);

    let astronautNames      = chartData.map(d => d.name);
    let timeSinceLastMission = chartData.map(d => d.timeSince);

    let data = [{
        type: 'bar',
        x: timeSinceLastMission,
        y: astronautNames,
        orientation: 'h',
        marker: {
            color: timeSinceLastMission,
            colorscale: [
                [0,    'rgb(166,206,227)'],
                [0.25, 'rgb(31,120,180)'],
                [0.45, 'rgb(178,223,138)'],
                [0.65, 'rgb(51,160,44)'],
                [0.85, 'rgb(251,154,153)'],
                [1,    'rgb(227,26,28)']
            ],
            cmin: 0,
            cmax: Math.max(...timeSinceLastMission)
        },
        text: timeSinceLastMission.map(t => t.toFixed(2) + '年'),
        textposition: 'auto',
        hoverinfo: 'text'
    }];

    let layout = {
        title: '距离上一次任务时间(年)',
        xaxis: { title: '距离上一次任务时间(年)' },
        yaxis: { title: '航天员' },
        height: 800,
        plot_bgcolor:  'black',
        paper_bgcolor: 'black',
        font: { color: 'white' }
    };

    Plotly.newPlot('bar-chart', data, layout);
  </script>
</body>
</html>
